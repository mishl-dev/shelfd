<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" width="400" height="600">
  <defs>
    <linearGradient id="bgGrad"
      x1="{{grad_x1}}%" y1="{{grad_y1}}%"
      x2="{{grad_x2}}%" y2="{{grad_y2}}%">
      <stop offset="0%" stop-color="{{grad_c1}}"/>
      <stop offset="100%" stop-color="{{grad_c2}}"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="600" fill="url(#bgGrad)"/>

  <!-- Shape 1 -->
  {{shape1}}

  <!-- Shape 2 -->
  {{shape2}}

  <!-- Shape 3 -->
  {{shape3}}

  <!-- Shape 4 -->
  {{shape4}}

  <!-- Overlay to unify shapes with background -->
  <rect width="400" height="600" fill="url(#bgGrad)" opacity="0.45"/>

  <!-- Top rule -->
  <line x1="40" y1="210" x2="200" y2="210" stroke="{{muted}}" stroke-width="1"/>

  <!-- Title (Lora) -->
  <text
    x="40" y="258"
    font-family="'Lora','Georgia',serif"
    font-size="{{title_size}}" font-weight="700"
    fill="{{fg}}">
    <tspan x="40" dy="0">{{title_line1}}</tspan>
    <tspan x="40" dy="1.1em" visibility="{{line2_vis}}">{{title_line2}}</tspan>
    <tspan x="40" dy="1.1em" visibility="{{line3_vis}}">{{title_line3}}</tspan>
  </text>

  <!-- Divider -->
  <line x1="40" y1="{{divider_y}}" x2="360" y2="{{divider_y}}" stroke="{{fg}}" stroke-width="0.75" opacity="0.4"/>

  <!-- Author (Lora italic) -->
  <text
    x="40" y="{{author_y}}"
    font-family="'Lora','Georgia',serif"
    font-size="16" font-weight="400" font-style="italic"
    fill="{{fg}}" opacity="0.7">{{author}}</text>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="6" height="600" fill="{{acc}}" opacity="0.9"/>
</svg>
